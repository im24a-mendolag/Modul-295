<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliothek – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #1a202c; }
    label { display: block; font-size: .875rem; color: #4a5568; margin-bottom: .25rem; }
    input {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 2px #bee3f8; }
    button {
      width: 100%;
      padding: .6rem;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #2b6cb0; }
    #message {
      margin-top: 1rem;
      padding: .6rem;
      border-radius: 4px;
      font-size: .875rem;
      display: none;
    }
    #message.success { background: #c6f6d5; color: #276749; }
    #message.error   { background: #fed7d7; color: #9b2c2c; }
    #logout-section { display: none; margin-top: 1rem; }
    #logout-btn { background: #e53e3e; }
    #logout-btn:hover { background: #c53030; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bibliothek Login</h1>

    <div id="login-section">
      <label for="email">E-Mail</label>
      <input type="email" id="email" placeholder="desk@library.example" required>

      <label for="password">Passwort</label>
      <input type="password" id="password" placeholder="••••••" required>

      <button id="login-btn">Anmelden</button>
    </div>

    <div id="logout-section">
      <p id="logged-in-as"></p>
      <button id="logout-btn">Abmelden</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const loginSection  = document.getElementById('login-section');
    const logoutSection = document.getElementById('logout-section');
    const loggedInAs    = document.getElementById('logged-in-as');
    const messageBox    = document.getElementById('message');

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className   = type;
      messageBox.style.display = 'block';
    }

    // Check current session on page load
    fetch('/verify')
      .then(r => r.json())
      .then(data => {
        if (data.email) {
          loginSection.style.display  = 'none';
          logoutSection.style.display = 'block';
          loggedInAs.textContent = `Eingeloggt als: ${data.email}`;
        }
      })
      .catch(() => {});

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();

      if (response.ok) {
        showMessage(`Erfolgreich eingeloggt als ${data.email}`, 'success');
        loginSection.style.display  = 'none';
        logoutSection.style.display = 'block';
        loggedInAs.textContent = `Eingeloggt als: ${data.email}`;
      } else {
        showMessage(data.error || 'Login fehlgeschlagen', 'error');
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/logout', { method: 'DELETE' });
      loginSection.style.display  = 'block';
      logoutSection.style.display = 'none';
      showMessage('Erfolgreich abgemeldet', 'success');
    });
  </script>
</body>
</html>
